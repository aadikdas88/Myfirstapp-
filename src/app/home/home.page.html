<ion-header>
  <ion-toolbar color="primary">
    <ion-title>JARVIS Login</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div class="login-box">

    <ion-icon name="hardware-chip-outline" class="logo"></ion-icon>

    <h2>Welcome Back</h2>
    <p>Sign in to access JARVIS AI</p>

    <ion-card>
      <ion-card-content>

        <ion-item>
          <ion-icon name="person-outline" slot="start"></ion-icon>
          <ion-input
            placeholder="Username"
            [(ngModel)]="username">
          </ion-input>
        </ion-item>

        <ion-item>
          <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
          <ion-input
            type="password"
            placeholder="Password"
            [(ngModel)]="password">
          </ion-input>
        </ion-item>

        <ion-button expand="block" (click)="login()">
          Login
        </ion-button>

      </ion-card-content>
    </ion-card>

  </div>

</ion-content>
